name: Deploy to Cloud Run (PR preview)
on:
  pull_request:
    branches:
      - mucho
    types:
      - opened
      - synchronize
      - reopened
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24' # renovate: datasource=node-version depName=node versioning=node
          cache: 'pnpm'

      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: 'projects/183505090883/locations/global/workloadIdentityPools/default/providers/provider-github'
          service_account: 'gh-actions@shion-project-business-card.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          version: '>= 363.0.0'

      - name: Authorize Docker
        id: docker-auth
        uses: docker/login-action@v4
        with:
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}
          registry: asia-northeast1-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: asia-northeast1-docker.pkg.dev/shion-project-business-card/default/github-pr-${{ github.event.number }}:latest
          context: .
          file: ./cloudrun/Dockerfile

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: github-pr-${{ github.event.number }}
          region: "asia-northeast1"
          image: asia-northeast1-docker.pkg.dev/shion-project-business-card/default/github-pr-${{ github.event.number }}:latest

      - name: Make CloudRun accessible
        run: |
          gcloud run services add-iam-policy-binding github-pr-${{ github.event.number }} --region=asia-northeast1 --member=allUsers --role=roles/run.invoker

      - name: Post comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URL: ${{ github.event.pull_request.html_url }}
        run:
          gh pr comment -b "Deployed on ${{ steps.deploy.outputs.url }}" ${{ github.event.number }}
